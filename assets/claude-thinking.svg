<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260">
  <style>
    @keyframes cursorBlink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    @keyframes shimmer { 0%{stop-color:#D97757} 50%{stop-color:#E8A87C} 100%{stop-color:#D97757} }

    /* Each line fades in, holds, then fades out across a 24s cycle (8 phrases x 3s each) */
    @keyframes line1 {
      0%,1%{opacity:0} 3%,10%{opacity:0.9} 12%,100%{opacity:0}
    }
    @keyframes line2 {
      0%,13%{opacity:0} 15%,22%{opacity:0.9} 24%,100%{opacity:0}
    }
    @keyframes line3 {
      0%,25.5%{opacity:0} 27.5%,35%{opacity:0.9} 37%,100%{opacity:0}
    }
    @keyframes line4 {
      0%,38%{opacity:0} 40%,47%{opacity:0.9} 49%,100%{opacity:0}
    }
    @keyframes line5 {
      0%,50.5%{opacity:0} 52.5%,60%{opacity:0.9} 62%,100%{opacity:0}
    }
    @keyframes line6 {
      0%,63%{opacity:0} 65%,72%{opacity:0.9} 74%,100%{opacity:0}
    }
    @keyframes line7 {
      0%,75.5%{opacity:0} 77.5%,85%{opacity:0.9} 87%,100%{opacity:0}
    }
    @keyframes line8 {
      0%,88%{opacity:0} 90%,97%{opacity:0.9} 99%,100%{opacity:0}
    }

    /* Scrolling lines that appear below active thought */
    @keyframes streamIn1 { 0%{width:0;opacity:0} 10%{opacity:0.4} 40%{width:260px;opacity:0.3} 60%{width:260px;opacity:0.15} 100%{width:0;opacity:0} }
    @keyframes streamIn2 { 0%{width:0;opacity:0} 15%{opacity:0.35} 45%{width:200px;opacity:0.25} 65%{width:200px;opacity:0.1} 100%{width:0;opacity:0} }
    @keyframes streamIn3 { 0%{width:0;opacity:0} 20%{opacity:0.3} 50%{width:150px;opacity:0.2} 70%{width:150px;opacity:0.08} 100%{width:0;opacity:0} }

    .bg { fill: #1A1A1A; }
    .header-text { font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; fill: #D97757; font-weight: 600; }
    .duration { font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace; font-size: 11px; fill: #6B5D4F; animation: pulse 2s ease-in-out infinite; }
    .thought { font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; fill: #D4C5B5; opacity: 0; }
    .t1 { animation: line1 24s ease-in-out infinite; }
    .t2 { animation: line2 24s ease-in-out infinite; }
    .t3 { animation: line3 24s ease-in-out infinite; }
    .t4 { animation: line4 24s ease-in-out infinite; }
    .t5 { animation: line5 24s ease-in-out infinite; }
    .t6 { animation: line6 24s ease-in-out infinite; }
    .t7 { animation: line7 24s ease-in-out infinite; }
    .t8 { animation: line8 24s ease-in-out infinite; }
    .cursor { fill: #D97757; animation: cursorBlink 1s step-end infinite; }
    .stream-line { fill: #D4A574; rx: 1.5; height: 2.5; }
    .s1 { animation: streamIn1 3.5s ease-out infinite; }
    .s2 { animation: streamIn2 3.5s ease-out 0.4s infinite; }
    .s3 { animation: streamIn3 3.5s ease-out 0.8s infinite; }
    .border-line { fill: #3D2E22; }
    .sparkle { fill: #D97757; }
    .dim { fill: #4A3F35; }
  </style>

  <defs>
    <linearGradient id="topGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97757;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#D97757;stop-opacity:0.5">
        <animate attributeName="stop-color" values="#D97757;#E8A87C;#D97757" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#D97757;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C9C2B7;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#C9C2B7;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="roundClip">
      <rect width="800" height="260" rx="12"/>
    </clipPath>
  </defs>

  <!-- Outer frame -->
  <rect class="bg" width="800" height="260" rx="12" stroke="#3D2E22" stroke-width="1"/>

  <!-- Top accent glow -->
  <rect x="0" y="0" width="800" height="2" rx="1" fill="url(#topGlow)" clip-path="url(#roundClip)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="40" fill="#1E1E1E" rx="0" clip-path="url(#roundClip)"/>
  <rect class="border-line" x="0" y="39" width="800" height="1"/>

  <!-- Window dots -->
  <circle cx="24" cy="20" r="5" fill="#FF5F57" opacity="0.6"/>
  <circle cx="44" cy="20" r="5" fill="#FFBD2E" opacity="0.6"/>
  <circle cx="64" cy="20" r="5" fill="#28C840" opacity="0.6"/>

  <!-- Sparkle icon -->
  <g transform="translate(88, 9)">
    <path class="sparkle" d="M11 1.5L13.3 8L20 10.3L13.3 12.7L11 19.2L8.7 12.7L2 10.3L8.7 8Z" transform="scale(0.7)" opacity="0.9">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Header text -->
  <text x="112" y="24" class="header-text">Thinking</text>

  <!-- Duration counter -->
  <text x="730" y="24" class="duration" text-anchor="end">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
    ~47s
  </text>

  <!-- Thinking content area -->
  <g transform="translate(32, 60)">

    <!-- Vertical accent line -->
    <rect x="0" y="0" width="2" height="170" rx="1" fill="#D97757" opacity="0.2"/>

    <!-- Animated thinking sentences — one visible at a time -->
    <text x="18" y="18" class="thought t1">Analyzing the architecture of the codebase...</text>
    <text x="18" y="18" class="thought t2">Considering edge cases in concurrent access patterns...</text>
    <text x="18" y="18" class="thought t3">Let me reason about the data flow here...</text>
    <text x="18" y="18" class="thought t4">Evaluating trade-offs between consistency and latency...</text>
    <text x="18" y="18" class="thought t5">This reminds me of the reactor pattern...</text>
    <text x="18" y="18" class="thought t6">Checking if this approach is safe under contention...</text>
    <text x="18" y="18" class="thought t7">Tracing the API contract for breaking changes...</text>
    <text x="18" y="18" class="thought t8">Mapping dependency boundaries to find the right seam...</text>

    <!-- Streaming placeholder lines below -->
    <g transform="translate(18, 40)">
      <rect class="stream-line s1" y="0" width="0" height="2.5"/>
      <rect class="stream-line s2" y="14" width="0" height="2.5"/>
      <rect class="stream-line s3" y="28" width="0" height="2.5"/>
    </g>

    <!-- Faded "previous thoughts" effect -->
    <g opacity="0.10">
      <rect x="18" y="100" width="280" height="2" rx="1" fill="#C9C2B7"/>
      <rect x="18" y="114" width="200" height="2" rx="1" fill="#C9C2B7"/>
      <rect x="18" y="128" width="240" height="2" rx="1" fill="#C9C2B7"/>
      <rect x="18" y="142" width="160" height="2" rx="1" fill="#C9C2B7"/>
    </g>

    <!-- Blinking cursor -->
    <rect class="cursor" x="18" y="160" width="8" height="2" rx="1"/>

  </g>

  <!-- Bottom status bar -->
  <rect class="border-line" x="0" y="239" width="800" height="1"/>
  <rect x="0" y="240" width="800" height="20" fill="#1E1E1E" clip-path="url(#roundClip)"/>
  <text x="24" y="254" class="dim" style="font-family:'SF Mono','Courier New',monospace;font-size:10px;">
    Claude is reasoning through your problem...
  </text>
  <text x="776" y="254" text-anchor="end" class="dim" style="font-family:'SF Mono','Courier New',monospace;font-size:10px;">
    extended thinking
  </text>

</svg>
